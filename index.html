<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QRIS Suryatokoku</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
  padding-top: 30px;
}
input, button {
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin: 6px;
}
button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}
#qrcode canvas {
  background: white;
  padding: 12px;
  border-radius: 16px;
  margin-top: 20px;
}
</style>
</head>
<body>

<h2>QRIS Suryatokoku</h2>
<p>Masukkan Nominal</p>

<input type="number" id="amount" placeholder="contoh: 15000">
<br>
<button onclick="generateQR()">Tampilkan QR</button>

<br><br>

<button onclick="quick(5000)">5.000</button>
<button onclick="quick(10000)">10.000</button>
<button onclick="quick(20000)">20.000</button>
<button onclick="quick(50000)">50.000</button>

<br>
<canvas id="qrcode"></canvas>

<script>
const qrisStatic = "00020101021126570011ID.DANA.WWW011893600915333496229502093349622950303UMI51440014ID.CO.QRIS.WWW0215ID10222175326650303UMI5204729853033605802ID5911Suryatokoku6012Kab. Cirebon61054518863043F0D";

function crc16(str){
  let crc=0xFFFF;
  for(let c=0;c<str.length;c++){
    crc ^= str.charCodeAt(c)<<8;
    for(let i=0;i<8;i++){
      crc=(crc&0x8000)?(crc<<1)^0x1021:crc<<1;
    }
  }
  return (crc&0xFFFF).toString(16).toUpperCase().padStart(4,'0');
}

function generateQR(){
  let amount=document.getElementById("amount").value;

  if(!amount){
    alert("Masukkan nominal dulu");
    return;
  }

  let payload=qrisStatic.replace("010211","010212");
  payload=payload.replace(/6304[A-F0-9]{4}$/,"");

  payload+="54"+amount.length.toString().padStart(2,'0')+amount;
  payload+="6304"+crc16(payload);

  const canvas=document.getElementById("qrcode");

  QRCode.toCanvas(canvas,payload,function(error){
    if(error){
      console.error(error);
      alert("Gagal generate QR");
    }
  });
}

function quick(val){
  document.getElementById("amount").value=val;
  generateQR();
}
</script>

</body>
</html>
